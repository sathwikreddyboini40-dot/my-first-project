<!DOCTYPE html>
<html>
<head>
    <title>My Slots</title>
</head>
<body>

    <h2>My Slots</h2>

    <table border="1">
        <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
        </tr>

        {% for slot in slots %}
        <tr>
            <td>{{ slot['date'] }}</td>
            <td>{{ slot['time'] }}</td>
            <td>
                {% if slot['is_booked'] == 0 %}
                    Available
                {% else %}
                    Booked
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
