{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h2>Login</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Enter Email" required><br><br>
        
        <input type="password" name="password" placeholder="Enter Password" required><br><br>

        <button type="submit">Login</button>
    </form>

</body>
</html>
{% endblock %}
